<div class="container">

  @if (prestamo.id) {
    <h1>Modificar préstamo</h1>
  } @else {
    <h1>Crear préstamo</h1>
  }

  <form>

    <!-- Identificador -->
    <mat-form-field>
      <mat-label>Identificador</mat-label>
      <input matInput type="text" [(ngModel)]="prestamo.id" name="id" disabled />
    </mat-form-field>

    <!-- Cliente -->
    <mat-form-field>
      <mat-label>Cliente</mat-label>
      <input
        type="text"
        matInput
        [matAutocomplete]="autoCliente"
        [formControl]="clienteCtrl"
        placeholder="Escribe para buscar cliente"
        required
      />
      <mat-autocomplete
        #autoCliente="matAutocomplete"
        [displayWith]="displayCliente"
        (optionSelected)="prestamo.clienteId = $event.option.value.id"
      >
        @for (c of (filteredClientes$ | async); track c.id) {
          <mat-option [value]="c">{{ c.name }}</mat-option>
        }
      </mat-autocomplete>
    </mat-form-field>

    <!-- Juego -->
    <mat-form-field>
      <mat-label>Juego</mat-label>
      <input
        type="text"
        matInput
        [matAutocomplete]="autoJuego"
        [formControl]="gameCtrl"
        placeholder="Escribe para buscar juego"
        required
      />
      <mat-autocomplete
        #autoJuego="matAutocomplete"
        [displayWith]="displayGame"
        (optionSelected)="prestamo.gameId = $event.option.value.id"
      >
        @for (g of (filteredGames$ | async); track g.id) {
          <mat-option [value]="g">{{ g.title }}</mat-option>
        }
      </mat-autocomplete>
    </mat-form-field>

    <!-- Fecha inicio -->
    <mat-form-field>
      <mat-label>Fecha inicio</mat-label>
      <input
        matInput
        [matDatepicker]="pickerInicio"
        [(ngModel)]="fechaPrestamoModel"
        name="fechaInicio"
        placeholder="Selecciona fecha de inicio"
        required
        (dateChange)="onFechaPrestamoChange()"   
      />
      <mat-datepicker-toggle matSuffix [for]="pickerInicio"></mat-datepicker-toggle>
      <mat-datepicker #pickerInicio></mat-datepicker>
    </mat-form-field>

    <!-- Fecha fin -->
    <mat-form-field>
      <mat-label>Fecha fin</mat-label>
      <input
        matInput
        [matDatepicker]="pickerFin"
        [(ngModel)]="fechaDevolucionModel"
        name="fechaFin"
        placeholder="Selecciona fecha de fin"
        [min]="minDevolucion"
        [max]="maxDevolucion"
      />
      <mat-datepicker-toggle matSuffix [for]="pickerFin"></mat-datepicker-toggle>
      <mat-datepicker #pickerFin></mat-datepicker>
    </mat-form-field>

  </form>

  <div class="buttons">
    <button mat-stroked-button (click)="onClose()">Cerrar</button>
    <button mat-flat-button color="primary" (click)="onSave()">Guardar</button>
  </div>
</div>
