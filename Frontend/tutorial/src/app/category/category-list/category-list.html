<div class="container">
    <h1>Listado de Categorías</h1>

    <mat-table [dataSource]="dataSource"> <!-- Crear tabla con la varible 'dataSource' -->
        <ng-container matColumnDef="id"> <!-- Definicion de la primera columna, su cabecera y dato que contendra -->
            <mat-header-cell *matHeaderCellDef> Identificador </mat-header-cell>
            <mat-cell *matCellDef="let element"> {{element.id}} </mat-cell>
        </ng-container>

        <ng-container matColumnDef="name"> <!-- Segunda columna ... -->
            <mat-header-cell *matHeaderCellDef> Nombre categoría  </mat-header-cell>
            <mat-cell *matCellDef="let element"> {{element.name}} </mat-cell>
        </ng-container>

        <ng-container matColumnDef="action"> <!-- Tercera columna -->
            <mat-header-cell *matHeaderCellDef></mat-header-cell>
            <mat-cell *matCellDef="let element">
                <button mat-icon-button color="primary" (click)="editCategory(element)">
                  <mat-icon>edit</mat-icon>
                </button>
                <button mat-icon-button color="accent" (click)="deleteCategory(element)">
                  <mat-icon>clear</mat-icon>
                </button>
            </mat-cell>
        </ng-container>

        <!-- Construccion de la cabecera y las filas -->
        <mat-header-row *matHeaderRowDef="displayedColumns; sticky: true"></mat-header-row>
        <mat-row *matRowDef="let row; columns: displayedColumns;"></mat-row>
    </mat-table>

    <div class="buttons">
        <button mat-flat-button color="primary" (click)="createCategory()">Nueva categoría</button> <!-- Boton -->
    </div>
</div>
